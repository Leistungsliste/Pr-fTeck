<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prüfdienstleister Weekly</title>

<style>
:root{
  --green:#8db255;
  --dark:#0f1720;
  --gray:#f4f6f8;
  --border:#e3e6ea;
  --text:#1b1f23;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  color:var(--text);
  background:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  border-bottom:1px solid var(--border);
}

.logo{
  font-size:22px;
  font-weight:bold;
}

.nav{
  display:flex;
  gap:20px;
}

.nav a{
  text-decoration:none;
  color:#333;
  font-weight:500;
}

.btn{
  background:var(--green);
  color:#fff;
  padding:10px 18px;
  border:none;
  cursor:pointer;
}

/* HERO */
.hero{
  padding:60px 40px;
  background:var(--gray);
  font-size:28px;
  font-weight:bold;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:20px;
  padding:30px 40px;
}

/* SIDEBAR */
.sidebar{
  border:1px solid var(--border);
  padding:20px;
}

.sidebar h3{
  margin-top:0;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid var(--border);
}

/* FEED */
.feed{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  border:1px solid var(--border);
  padding:20px;
}

.card.weekly{
  border-left:6px solid var(--green);
  background:#f9fbf6;
}

.chips{
  margin:10px 0;
}

.chip{
  display:inline-block;
  background:#eef2f5;
  padding:5px 10px;
  margin-right:5px;
  font-size:12px;
}

.search{
  width:100%;
  padding:12px;
  margin-bottom:20px;
}

/* MOBILE */
@media(max-width:900px){
  .container{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DPS Weekly</div>
  <div class="nav">
    <a href="#">Unternehmen</a>
    <a href="#">Leistungen</a>
    <a href="#">Wissen</a>
    <button class="btn">Anfragen</button>
  </div>
</div>

<div class="hero">
  WIR VERANTWORTEN DIE SICHERHEIT.<br>
  DEIN WÖCHENTLICHES PRÜFDIENSTLEISTER UPDATE.
</div>

<div class="container">

  <div class="sidebar">
    <h3>Weekly Feed</h3>

    <input id="feedUrl" value="./prueftechniker-weekly.xml">

    <button onclick="loadFeed()" class="btn">Feed laden</button>

    <p id="status"></p>
  </div>

  <div>

    <input id="search" class="search" placeholder="Suche..." oninput="render()">

    <div id="feed" class="feed"></div>

  </div>

</div>

<script>
let entries=[]

function strip(html){
  let div=document.createElement("div")
  div.innerHTML=html
  return div.textContent || div.innerText
}

async function loadFeed(){
  const url=document.getElementById("feedUrl").value

  try{
    const res=await fetch(url)
    const text=await res.text()

    const xml=new DOMParser().parseFromString(text,"text/xml")
    const items=[...xml.querySelectorAll("item")]

    entries=items.map(item=>({
      title:item.querySelector("title")?.textContent,
      desc:item.querySelector("description")?.textContent,
      date:item.querySelector("pubDate")?.textContent,
      link:item.querySelector("link")?.textContent
    }))

    document.getElementById("status").innerText="Feed geladen ✔"
    render()

  }catch{
    document.getElementById("status").innerText="Fehler beim Laden"
  }
}

function render(){
  const search=document.getElementById("search").value.toLowerCase()

  const container=document.getElementById("feed")

  const filtered=entries.filter(e=>
    e.title.toLowerCase().includes(search) ||
    strip(e.desc).toLowerCase().includes(search)
  )

  if(!filtered.length){
    container.innerHTML="<p>Keine Einträge</p>"
    return
  }

  container.innerHTML=filtered.map(e=>`
    <div class="card weekly">
      <h3>${e.title}</h3>
      <div class="chips">
        <span class="chip">Weekly</span>
        <span class="chip">${new Date(e.date).toLocaleDateString()}</span>
      </div>
      <p>${strip(e.desc).slice(0,400)}</p>
      <a href="${e.link}" target="_blank">Quelle öffnen</a>
    </div>
  `).join("")
}

loadFeed()
</script>

</body>
</html>
